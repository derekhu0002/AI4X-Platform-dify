    - data:
        code: "import json\n\ndef main(response_json: str) -> dict:\n    payload =\
          \ json.loads(response_json)\n    item = (payload.get(\"items\") or [{}])[0]\n\
          \    target_roles = item.get(\"target_roles\") or []\n    return {\n   \
          \   \"risk_object\": str(item.get(\"risk_object\") or \"待识别风险对象\"),\n  \
          \      \"scene_type\": str(item.get(\"scene_type\") or \"待分析\"),\n     \
          \   \"severity\": str(item.get(\"severity\") or \"unknown\"),\n        \"\
          priority\": str(item.get(\"priority\") or \"P4\"),\n        \"task_status\"\
          : str(item.get(\"task_status\") or \"待处理\"),\n        \"name\": str(item.get(\"\
          name\") or \"未命名任务\"),\n      \"primary_asset\": str(item.get(\"primary_asset\"\
          ) or \"待补充资产\"),\n      \"deployment_scope\": str(item.get(\"deployment_scope\"\
          ) or \"待补充部署范围\"),\n      \"owner_team\": str(item.get(\"owner_team\") or\
