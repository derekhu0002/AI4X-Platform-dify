app:
  description: Unified AI4SEC workflow that routes four value-stream scenarios from
    one Dify asset.
  icon: 🤖
  icon_background: '#E7F6EC'
  mode: advanced-chat
  name: AI4SEC Unified Workflow
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
metadata:
  webhook:
    auth_required: false
    entry_mode: dify-native-workflow
workflow:
  conversation_variables:
  - description: ''
    id: 4ff6b443-a304-40f9-b6bd-572fbafd7794
    name: selected_flow
    selector:
    - conversation
    - selected_flow
    value: ''
    value_type: string
  - description: ''
    id: a2e3123d-be5f-40ea-98a7-e39ef519036e
    name: routing_reason
    selector:
    - conversation
    - routing_reason
    value: ''
    value_type: string
  environment_variables:
  - description: ''
    id: 3f2de023-7aee-4c3e-9530-eb5c992f311a
    name: OPENCTI_MCP_URL
    selector:
    - env
    - OPENCTI_MCP_URL
    value: http://host.docker.internal:8101
    value_type: string
  - description: ''
    id: 37cb31d9-1781-42d3-9dc4-2d29af5246cb
    name: NOTIFICATION_MCP_URL
    selector:
    - env
    - NOTIFICATION_MCP_URL
    value: http://host.docker.internal:8102
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 请选择业务流程，或直接描述你的安全情报需求，我会自动分流到 VS1/VS2/VS3/VS4。
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 帮我做一次发布前威胁建模
    - 分析一条横向移动告警并生成响应动作
    - 评估外部漏洞对企业的影响
    - 生成一条环境感知监控规则
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: if-else
      id: edge-start-router
      source: start-node
      sourceHandle: source
      target: route-intent
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: http-request
      id: edge-router-vs1
      source: route-intent
      sourceHandle: vs1
      target: call-vs1
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: http-request
      id: edge-router-vs2
      source: route-intent
      sourceHandle: vs2
      target: call-vs2
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: http-request
      id: edge-router-vs3
      source: route-intent
      sourceHandle: vs3
      target: call-vs3
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: http-request
      id: edge-router-vs4
      source: route-intent
      sourceHandle: vs4
      target: call-vs4
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: code
      id: edge-vs1-answer
      source: call-vs1
      sourceHandle: source
      target: parse_vs1
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: answer
      id: edge-parse-vs1-answer
      source: parse_vs1
      sourceHandle: source
      target: answer-vs1
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: code
      id: edge-vs2-answer
      source: call-vs2
      sourceHandle: source
      target: parse_vs2
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: answer
      id: edge-parse-vs2-answer
      source: parse_vs2
      sourceHandle: source
      target: answer-vs2
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: code
      id: edge-vs3-answer
      source: call-vs3
      sourceHandle: source
      target: parse_vs3
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: answer
      id: edge-parse-vs3-answer
      source: parse_vs3
      sourceHandle: source
      target: answer-vs3
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: code
      id: edge-vs4-answer
      source: call-vs4
      sourceHandle: source
      target: parse_vs4
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: if-else
      id: edge-parse-vs4-answer
      source: parse_vs4
      sourceHandle: source
      target: vs4-manual-review
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: http-request
      id: edge-vs4-review-approved-notify
      source: vs4-manual-review
      sourceHandle: approved
      target: notify-vs4
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: answer
      id: edge-vs4-review-blocked-answer
      source: vs4-manual-review
      sourceHandle: source
      target: answer-vs4-blocked
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: answer
      id: edge-vs4-notify-answer
      source: notify-vs4
      sourceHandle: source
      target: answer-vs4
      targetHandle: target
      type: custom
    - data:
        isInLoop: false
        sourceType: if-else
        targetType: answer
      id: route-intent-false-answer_router_fallback-target
      source: route-intent
      sourceHandle: 'false'
      target: answer_router_fallback
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: ''
        title: Unified Entry
        type: start
        variables:
        - label: entry_mode
          max_length: 64
          required: false
          type: text-input
          variable: entry_mode
        - label: user_request
          max_length: 2000
          required: false
          type: paragraph
          variable: user_request
        - label: selected_flow
          options:
          - VS1
          - VS2
          - VS3
          - VS4
          required: false
          type: select
          variable: selected_flow
        - label: manual_review_decision
          options:
          - pending
          - approved
          - rejected
          required: false
          type: select
          variable: manual_review_decision
        - label: notify_primary_recipient
          max_length: 256
          required: false
          type: text-input
          variable: notify_primary_recipient
        - label: opencti_object_id
          max_length: 256
          required: false
          type: text-input
          variable: opencti_object_id
        - label: opencti_object_type
          max_length: 64
          required: false
          type: text-input
          variable: opencti_object_type
