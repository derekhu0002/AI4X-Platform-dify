app:
  description: Unified AI4SEC workflow that routes four value-stream scenarios from one Dify asset.
  icon: shield
  icon_background: '#E7F6EC'
  mode: advanced-chat
  name: AI4SEC Unified Workflow
  use_icon_as_answer_icon: false
kind: app
version: 0.3.0
workflow:
  conversation_variables:
    - name: selected_flow
      value: ''
      value_type: string
    - name: routing_reason
      value: ''
      value_type: string
  environment_variables:
    - name: OPENCTI_MCP_URL
      value: http://host.docker.internal:8101
      value_type: string
    - name: NOTIFICATION_MCP_URL
      value: http://host.docker.internal:8102
      value_type: string
  features:
    opening_statement: 请选择业务流程，或直接描述你的安全情报需求，我会自动分流到 VS1/VS2/VS3/VS4。
    suggested_questions:
      - 帮我做一次发布前威胁建模
      - 分析一条横向移动告警并生成响应动作
      - 评估外部漏洞对企业的影响
      - 生成一条环境感知监控规则
  graph:
    edges:
      - id: edge-start-router
        source: start-node
        sourceHandle: source
        target: route-intent
        targetHandle: target
      - id: edge-router-vs1
        source: route-intent
        sourceHandle: vs1
        target: call-vs1
        targetHandle: target
      - id: edge-router-vs2
        source: route-intent
        sourceHandle: vs2
        target: call-vs2
        targetHandle: target
      - id: edge-router-vs3
        source: route-intent
        sourceHandle: vs3
        target: call-vs3
        targetHandle: target
      - id: edge-router-vs4
        source: route-intent
        sourceHandle: vs4
        target: call-vs4
        targetHandle: target
      - id: edge-router-fallback
        source: route-intent
        sourceHandle: false
        target: answer_router_fallback
        targetHandle: target
      - id: edge-vs1-answer
        source: call-vs1
        sourceHandle: source
        target: parse_vs1
        targetHandle: target
      - id: edge-parse-vs1-answer
        source: parse_vs1
        sourceHandle: source
        target: answer-vs1
        targetHandle: target
      - id: edge-vs2-answer
        source: call-vs2
        sourceHandle: source
        target: parse_vs2
        targetHandle: target
      - id: edge-parse-vs2-answer
        source: parse_vs2
        sourceHandle: source
        target: answer-vs2
        targetHandle: target
      - id: edge-vs3-answer
        source: call-vs3
        sourceHandle: source
        target: parse_vs3
        targetHandle: target
      - id: edge-parse-vs3-answer
        source: parse_vs3
        sourceHandle: source
        target: answer-vs3
        targetHandle: target
      - id: edge-vs4-answer
        source: call-vs4
        sourceHandle: source
        target: parse_vs4
        targetHandle: target
      - id: edge-parse-vs4-answer
        source: parse_vs4
        sourceHandle: source
        target: answer-vs4
        targetHandle: target
    nodes:
      - id: start-node
        position:
          x: 100
          y: 120
        data:
          desc: ''
          title: Unified Entry
          type: start
          variables:
            - label: entry_mode
              max_length: 64
              required: false
              type: text-input
              variable: entry_mode
            - label: user_request
              max_length: 2000
              required: false
              type: paragraph
              variable: user_request
            - label: selected_flow
              options:
                - VS1
                - VS2
                - VS3
                - VS4
              required: false
              type: select
              variable: selected_flow
      - id: route-intent
        position:
          x: 420
          y: 120
        data:
          desc: ''
          title: Route By Menu Or Intent
          type: if-else
          cases:
            - case_id: vs1
              logical_operator: or
              conditions:
                - id: vs1-selected-flow
                  varType: string
                  variable_selector:
                    - start-node
                    - selected_flow
                  comparison_operator: '='
                  value: VS1
                - id: vs1-user-request
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 威胁建模
                - id: vs1-query-launch
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 上线前
            - case_id: vs2
              logical_operator: or
              conditions:
                - id: vs2-selected-flow
                  varType: string
                  variable_selector:
                    - start-node
                    - selected_flow
                  comparison_operator: '='
                  value: VS2
                - id: vs2-user-request
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 响应
                - id: vs2-alert
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 告警
                - id: vs2-lateral-movement
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 横向移动
                - id: vs2-intake
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 任务受理
            - case_id: vs3
              logical_operator: or
              conditions:
                - id: vs3-selected-flow
                  varType: string
                  variable_selector:
                    - start-node
                    - selected_flow
                  comparison_operator: '='
                  value: VS3
                - id: vs3-user-request
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 漏洞
                - id: vs3-impact
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 企业影响
                - id: vs3-cve
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: CVE-
                - id: vs3-asset-mapping
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 映射到内部资产
            - case_id: vs4
              logical_operator: or
              conditions:
                - id: vs4-selected-flow
                  varType: string
                  variable_selector:
                    - start-node
                    - selected_flow
                  comparison_operator: '='
                  value: VS4
                - id: vs4-user-request
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 监控
                - id: vs4-rule
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 风险转成环境监控任务
                - id: vs4-bola
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: BOLA
                - id: vs4-business-asset
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 业务资产
                - id: vs4-production-env
                  varType: string
                  variable_selector:
                    - start-node
                    - sys.query
                  comparison_operator: contains
                  value: 生产环境
      - id: call-vs1
        position:
          x: 760
          y: 0
        data:
          desc: ''
          title: VS1 Threat Modeling
          type: http-request
          variables: []
          method: post
          url: '{{#env.OPENCTI_MCP_URL#}}/query'
          authorization:
            type: no-auth
            config: null
          headers: ''
          params: ''
          body:
            type: json
            data:
              - type: text
                value: '{"object_id":"attack-pattern--vs1","projection_profile":"analysis","fields":["risk_object","scene_type","severity","priority","task_status","business_impact","target_roles","primary_asset","deployment_scope","owner_team","business_domain","business_criticality","execution_window"],"include_relationships":true,"relationship_depth":1}'
          ssl_verify: true
          timeout:
            connect: 10
            read: 600
            write: 600
            max_connect_timeout: 10
            max_read_timeout: 600
            max_write_timeout: 600
          retry_config:
            retry_enabled: true
            max_retries: 3
            retry_interval: 100
      - id: parse_vs1
        position:
          x: 950
          y: 0
        data:
          desc: ''
          title: Parse VS1 Response
          type: code
          variables:
            - variable: response_json
              value_selector:
                - call-vs1
                - body
          code_language: python3
          code: |
            import json

            def main(response_json: str) -> dict:
                payload = json.loads(response_json)
                item = (payload.get("items") or [{}])[0]
                target_roles = item.get("target_roles") or []
                return {
                  "risk_object": str(item.get("risk_object") or "待识别风险对象"),
                    "scene_type": str(item.get("scene_type") or "待分析"),
                    "severity": str(item.get("severity") or "unknown"),
                    "priority": str(item.get("priority") or "P4"),
                    "task_status": str(item.get("task_status") or "待处理"),
                    "name": str(item.get("name") or "未命名任务"),
                  "primary_asset": str(item.get("primary_asset") or "待补充资产"),
                  "deployment_scope": str(item.get("deployment_scope") or "待补充部署范围"),
                  "owner_team": str(item.get("owner_team") or "待分配团队"),
                  "business_domain": str(item.get("business_domain") or "待补充业务域"),
                  "business_criticality": str(item.get("business_criticality") or "待评估"),
                  "execution_window": str(item.get("execution_window") or "待确认"),
                    "business_impact": str(item.get("business_impact") or "待业务复核"),
                    "target_roles_text": "、".join(str(role) for role in target_roles) if target_roles else "情报分析师",
                }
          outputs:
            scene_type:
              type: string
              children: null
            risk_object:
              type: string
              children: null
            severity:
              type: string
              children: null
            priority:
              type: string
              children: null
            task_status:
              type: string
              children: null
            name:
              type: string
              children: null
            primary_asset:
              type: string
              children: null
            deployment_scope:
              type: string
              children: null
            owner_team:
              type: string
              children: null
            business_domain:
              type: string
              children: null
            business_criticality:
              type: string
              children: null
            execution_window:
              type: string
              children: null
            business_impact:
              type: string
              children: null
            target_roles_text:
              type: string
              children: null
