          : str(report_object.get(\"description\", \"\")),\n                \"match_strategy\"\
          : matched_report[\"match_strategy\"],\n            },\n            \"components\"\
          : components,\n            \"assets\": assets,\n        }\n\n    matched_candidate = query_report_by_id(effective_ref)\n\
          \    matched_report = None\n    if matched_candidate is not None:\n    \
          \    matched_report = {\n            \"report_id\": matched_candidate[\"\
          report_id\"],\n            \"report_name\": matched_candidate[\"report_name\"\
          ],\n            \"match_strategy\": \"exact-id\",\n        }\n    else:\n\
          \        alias_name = resolve_report_name_from_local_bundles(effective_ref)\
          \ if normalize(effective_ref).startswith(\"report--\") else None\n     \
          \   if alias_name and normalize(alias_name) != normalize(effective_ref):\n\
