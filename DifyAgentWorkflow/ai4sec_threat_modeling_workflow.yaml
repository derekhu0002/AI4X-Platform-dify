        code: "import json\nimport urllib.parse\n\ndef main(response_json: str, analysis_json_raw:\
          \ str) -> dict:\n    # // @ArchitectureID: 1436\n    payload = json.loads(response_json)\n\
          \    matched_report = payload.get(\"matched_report\") or {}\n    \n    #\
          \ Strip possible Markdown fences from LLM raw JSON output\n    clean_json\
          \ = analysis_json_raw.strip()\n    if clean_json.startswith('```json'):\n\
          \        clean_json = clean_json[7:]\n    elif clean_json.startswith('```'):\n\
          \        clean_json = clean_json[3:]\n    if clean_json.endswith('```'):\n\
          \        clean_json = clean_json[:-3]\n    clean_json = clean_json.strip()\n\
          \    \n    analysis = json.loads(clean_json)\n    analysis_json = json.dumps(analysis,\
          \ ensure_ascii=False, indent=2)\n    download_uri = \"data:application/json;charset=utf-8,\"\
          \ + urllib.parse.quote(analysis_json)\n    summary = analysis.get(\"summary\"\
          ) or {}\n    return {\n        \"report_name\": str(matched_report.get(\"\
          report_name\") or \"\"),\n        \"report_id\": str(matched_report.get(\"\
          report_id\") or \"\"),\n        \"match_strategy\": str(matched_report.get(\"\
          match_strategy\") or \"unknown\"),\n        \"download_filename\": str(payload.get(\"\
