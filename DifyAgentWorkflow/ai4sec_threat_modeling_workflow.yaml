app:
  description: Standalone VS1 threat-modeling workflow that resolves a report from
    OpenCTI, filters STIX 2.1 evidence, invokes a real LLM with the ArchitectureID
    1437 schema, and exposes the final JSON result in-session with a download link.
  icon: 🤖
  icon_background: '#EAF2FF'
  mode: advanced-chat
  name: AI4SEC Threat Modeling Workflow
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/tongyi:0.1.19@12ddda76bb473f9beb52d2ea2a67412d54924f93a29465fffb8635ba62b409c3
    version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables:
  - description: ''
    id: env-opencti-graphql-url-threat-model
    name: OPENCTI_GRAPHQL_URL
    selector:
    - env
    - OPENCTI_GRAPHQL_URL
    value: http://host.docker.internal:8080/graphql
    value_type: string
  - description: ''
    id: env-opencti-admin-token-threat-model
    name: OPENCTI_ADMIN_TOKEN
    selector:
    - env
    - OPENCTI_ADMIN_TOKEN
    value: c118a69a-9d60-441f-b30b-a0967694707e
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 请输入报告名称或报告 ID，我会优先做精确匹配，回查真实 OpenCTI 数据，并执行一次真实 LLM 威胁建模分析。
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 用报告名称 vs1-payment-threat-model 发起一次威胁建模
    - 用报告名称 vs4-bola-monitoring-rule 分析并下载 JSON
    - 用报告 ID report--cdd45eb6-f1cd-4f17-82b3-ac4bc03fcd58 发起一次威胁建模
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: code
      id: edge-start-resolve_report_ref
      source: start_node
      sourceHandle: source
      target: resolve_report_ref
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: code
      id: edge-resolve-query_threat_model_report
      source: resolve_report_ref
      sourceHandle: source
      target: query_threat_model_report
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: llm
      id: edge-query-llm_threat_model
      source: query_threat_model_report
      sourceHandle: source
      target: llm_threat_model
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: code
      id: edge-llm-format_threat_model
      source: llm_threat_model
      sourceHandle: source
      target: format_threat_model
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: answer
      id: edge-format-answer_threat_model
      source: format_threat_model
      sourceHandle: source
      target: answer_threat_model
      targetHandle: target
      type: custom
    nodes:
    - data:
        desc: ''
        selected: false
        title: Threat Modeling Input
        type: start
        variables:
        - label: report_ref
          max_length: 256
          required: false
          type: text-input
          variable: report_ref
        - label: analysis_focus
          max_length: 512
          required: false
          type: paragraph
          variable: analysis_focus
      height: 135
      id: start_node
      position:
        x: 30
        y: 140
      positionAbsolute:
        x: 30
        y: 140
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "def main(report_ref: str | None = None, sys_query: str | None = None)\
          \ -> dict:\n    # // @ArchitectureID: 1436\n    explicit_ref = str(report_ref\
          \ or \"\").strip()\n    query_ref = str(sys_query or \"\").strip()\n   \
          \ effective_ref = explicit_ref or query_ref\n    if not effective_ref:\n\
          \        raise ValueError(\"请直接输入报告名称或报告 ID。\")\n    return {\"report_ref\"\
          : effective_ref}\n"
        code_language: python3
        desc: ''
        outputs:
          report_ref:
            children: null
            type: string
        selected: false
        title: Resolve Report Reference
        type: code
        variables:
        - value_selector:
          - start_node
          - report_ref
          variable: report_ref
        - value_selector:
          - start_node
          - sys
          - query
          variable: sys_query
      height: 52
      id: resolve_report_ref
      position:
        x: 330
        y: 140
      positionAbsolute:
        x: 330
        y: 140
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "def main(report_ref: str, opencti_graphql_url: str | None = None, opencti_admin_token:\
          \ str | None = None) -> dict:\n    # // @ArchitectureID: 1436\n    import\
          \ json\n    import re\n    from pathlib import Path\n    from urllib import\
          \ error as urllib_error\n    from urllib import request as urllib_request\n\
          \n    graph_url = str(opencti_graphql_url or \"\").strip()\n    api_token\
          \ = str(opencti_admin_token or \"\").strip()\n    effective_ref = str(report_ref\
          \ or \"\").strip()\n    if not effective_ref:\n        raise ValueError(\"\
          请直接输入报告名称或报告 ID。\")\n    if not graph_url:\n        raise ValueError(\"\
          OPENCTI_GRAPHQL_URL 未配置。\")\n    if not api_token:\n        raise ValueError(\"\
          OPENCTI_ADMIN_TOKEN 未配置。\")\n\n    threat_model_bundle_fields = {\n    \
          \    \"report\": {\"id\", \"type\", \"spec_version\", \"name\", \"description\"\
          , \"published\", \"report_types\", \"object_refs\"},\n        \"identity\"\
          : {\"id\", \"type\", \"spec_version\", \"name\", \"identity_class\", \"\
          sectors\"},\n        \"software\": {\"id\", \"type\", \"spec_version\",\
          \ \"name\", \"version\", \"vendor\"},\n        \"infrastructure\": {\"id\"\
          , \"type\", \"spec_version\", \"name\", \"description\", \"infrastructure_types\"\
          },\n        \"vulnerability\": {\"id\", \"type\", \"spec_version\", \"name\"\
          , \"description\"},\n        \"attack-pattern\": {\"id\", \"type\", \"spec_version\"\
          , \"name\", \"description\", \"kill_chain_phases\"},\n        \"course-of-action\"\
          : {\"id\", \"type\", \"spec_version\", \"name\", \"description\"},\n   \
          \     \"note\": {\"id\", \"type\", \"spec_version\", \"abstract\", \"content\"\
          , \"object_refs\"},\n        \"opinion\": {\"id\", \"type\", \"spec_version\"\
          , \"opinion\", \"explanation\", \"object_refs\"},\n        \"relationship\"\
          : {\"id\", \"type\", \"spec_version\", \"relationship_type\", \"description\"\
          , \"source_ref\", \"target_ref\"},\n    }\n    threat_model_bundle_order\
          \ = {\n        \"report\": 0,\n        \"identity\": 1,\n        \"software\"\
          : 2,\n        \"infrastructure\": 3,\n        \"vulnerability\": 4,\n  \
          \      \"attack-pattern\": 5,\n        \"course-of-action\": 6,\n      \
          \  \"note\": 7,\n        \"opinion\": 8,\n        \"relationship\": 9,\n\
          \    }\n\n    def normalize(value: str) -> str:\n        return re.sub(r\"\
          \\s+\", \" \", value or \"\").strip().lower()\n\n    def build_download_filename(report_name:\
          \ str) -> str:\n        sanitized = re.sub(r\"[^A-Za-z0-9._-]+\", \"-\"\
          , report_name.strip()).strip(\"-\") or \"threat-model\"\n        return\
          \ f\"{sanitized}-threat-model.json\"\n\n    def post_graphql(query: str,\
          \ variables: dict, operation_name: str) -> dict:\n        request_body =\
          \ json.dumps(\n            {\"query\": query, \"variables\": variables,\
          \ \"operationName\": operation_name},\n            ensure_ascii=False,\n\
          \        ).encode(\"utf-8\")\n        request = urllib_request.Request(\n\
          \            graph_url,\n            data=request_body,\n            headers={\n\
          \                \"Content-Type\": \"application/json\",\n             \
          \   \"Authorization\": f\"Bearer {api_token}\",\n            },\n      \
          \      method=\"POST\",\n        )\n        try:\n            with urllib_request.urlopen(request,\
          \ timeout=60) as response:\n                payload = json.loads(response.read().decode(\"\
          utf-8\"))\n        except urllib_error.HTTPError as error:\n           \
          \ detail = error.read().decode(\"utf-8\", errors=\"ignore\")\n         \
          \   raise ValueError(f\"OpenCTI GraphQL HTTP {error.code}: {detail}\") from\
          \ error\n        except urllib_error.URLError as error:\n            raise\
          \ ValueError(f\"OpenCTI GraphQL 不可达: {error.reason}\") from error\n\n  \
          \      graphql_errors = payload.get(\"errors\") or []\n        if graphql_errors:\n\
          \            message = graphql_errors[0].get(\"message\") if isinstance(graphql_errors[0],\
          \ dict) else str(graphql_errors[0])\n            raise ValueError(f\"OpenCTI\
          \ GraphQL 错误: {message}\")\n        return payload.get(\"data\") or {}\n\
          \n    def query_report_by_id(candidate_ref: str) -> dict | None:\n     \
          \   query = \"\"\"\n        query ReportById($id: String!) {\n         \
          \ stixCoreObject(id: $id) {\n            id\n            standard_id\n \
          \           entity_type\n            ... on Report {\n              name\n\
          \              description\n              published\n              report_types\n\
          \            }\n          }\n        }\n        \"\"\"\n        data = post_graphql(query,\
          \ {\"id\": candidate_ref}, \"ReportById\")\n        node = data.get(\"stixCoreObject\"\
          )\n        if not node:\n            return None\n        if str(node.get(\"\
          entity_type\") or \"\").lower() != \"report\":\n            return None\n\
          \        internal_id = str(node.get(\"id\") or \"\")\n        report_id\
          \ = str(node.get(\"standard_id\") or \"\")\n        report_name = str(node.get(\"\
          name\") or \"\")\n        if not internal_id or not report_id or not report_name:\n\
          \            return None\n        return {\n            \"internal_id\"\
          : internal_id,\n            \"report_id\": report_id,\n            \"report_name\"\
          : report_name,\n            \"description\": str(node.get(\"description\"\
          ) or \"\"),\n            \"published\": str(node.get(\"published\") or \"\
          \"),\n        }\n\n    def query_report_by_exact_name(candidate_name: str)\
          \ -> dict | None:\n        normalized_name = normalize(candidate_name)\n\
          \        if not normalized_name:\n            return None\n        query\
          \ = \"\"\"\n        query ReportByExactName($filters: FilterGroup, $first:\
          \ Int!) {\n          reports(filters: $filters, first: $first) {\n     \
          \       edges {\n              node {\n                id\n            \
          \    standard_id\n                name\n                description\n  \
          \              published\n              }\n            }\n          }\n\
          \        }\n        \"\"\"\n        data = post_graphql(\n            query,\n\
          \            {\n                \"first\": 2,\n                \"filters\"\
          : {\n                    \"mode\": \"and\",\n                    \"filterGroups\"\
          : [],\n                    \"filters\": [\n                        {\n \
          \                           \"key\": \"name\",\n                       \
          \     \"values\": [candidate_name],\n                            \"operator\"\
          : \"eq\",\n                            \"mode\": \"or\",\n             \
          \           }\n                    ],\n                },\n            },\n\
          \            \"ReportByExactName\",\n        )\n        matches = []\n \
          \       for edge in data.get(\"reports\", {}).get(\"edges\", []):\n    \
          \        node = edge.get(\"node\") or {}\n            internal_id = str(node.get(\"\
          id\") or \"\")\n            report_id = str(node.get(\"standard_id\") or\
          \ \"\")\n            report_name = str(node.get(\"name\") or \"\")\n   \
          \         if not internal_id or not report_id or not report_name:\n    \
          \            continue\n            if normalize(report_name) != normalized_name:\n\
          \                continue\n            matches.append(\n               \
          \ {\n                    \"internal_id\": internal_id,\n               \
          \     \"report_id\": report_id,\n                    \"report_name\": report_name,\n\
          \                    \"description\": str(node.get(\"description\") or \"\
          \"),\n                    \"published\": str(node.get(\"published\") or\
          \ \"\"),\n                }\n            )\n        if not matches:\n  \
          \          return None\n        if len(matches) > 1:\n            raise\
          \ ValueError(f\"报告名称 '{candidate_name}' 命中了多个精确匹配结果。\")\n        return\
          \ matches[0]\n\n    def resolve_report_name_from_local_bundles(candidate_ref:\
          \ str) -> str | None:\n        search_roots = [Path.cwd(), *Path.cwd().parents]\n\
          \        for root in search_roots:\n            test_data_dir = root / \"\
          tests\" / \"validation\" / \"test-data\"\n            if not test_data_dir.exists():\n\
          \                continue\n            for bundle_path in sorted(test_data_dir.glob(\"\
          *.json\")):\n                try:\n                    payload = json.loads(bundle_path.read_text(encoding=\"\
          utf-8\"))\n                except (OSError, ValueError):\n             \
          \       continue\n                if payload.get(\"type\") != \"bundle\"\
          :\n                    continue\n                for stix_object in payload.get(\"\
          objects\", []):\n                    if str(stix_object.get(\"type\") or\
          \ \"\").lower() != \"report\":\n                        continue\n     \
          \               if normalize(str(stix_object.get(\"id\") or \"\")) == normalize(candidate_ref):\n\
          \                        report_name = str(stix_object.get(\"name\") or\
          \ \"\").strip()\n                        return report_name or None\n  \
          \      return None\n\n    def normalize_entity_type(entity_type: str) ->\
          \ str:\n        return entity_type.strip().lower().replace(\"_\", \"-\"\
          )\n\n    def convert_live_node_to_stix(node: dict) -> dict | None:\n   \
          \     object_id = str(node.get(\"standard_id\") or node.get(\"id\") or \"\
          \")\n        object_type = normalize_entity_type(str(node.get(\"entity_type\"\
          ) or node.get(\"__typename\") or \"\"))\n        if not object_id or object_type\
          \ not in threat_model_bundle_fields or object_type == \"report\":\n    \
          \        return None\n\n        representative = node.get(\"representative\"\
          ) or {}\n        description = str(node.get(\"description\") or representative.get(\"\
          secondary\") or \"\")\n        stix_object = {\"type\": object_type, \"\
          spec_version\": \"2.1\", \"id\": object_id}\n\n        if object_type ==\
          \ \"attack-pattern\":\n            stix_object[\"name\"] = str(node.get(\"\
          attack_pattern_name\") or representative.get(\"main\") or object_id)\n \
          \           if description:\n                stix_object[\"description\"\
          ] = description\n            kill_chain_phases = list(node.get(\"kill_chain_phases\"\
          ) or [])\n            if kill_chain_phases:\n                stix_object[\"\
          kill_chain_phases\"] = kill_chain_phases\n            return stix_object\n\
          \n        if object_type == \"indicator\":\n            stix_object[\"name\"\
          ] = str(node.get(\"indicator_name\") or representative.get(\"main\") or\
          \ object_id)\n            if description:\n                stix_object[\"\
          description\"] = description\n            if node.get(\"pattern_type\"):\n\
          \                stix_object[\"pattern_type\"] = str(node.get(\"pattern_type\"\
          ))\n            if node.get(\"pattern\"):\n                stix_object[\"\
          pattern\"] = str(node.get(\"pattern\"))\n            if node.get(\"valid_from\"\
          ):\n                stix_object[\"valid_from\"] = str(node.get(\"valid_from\"\
          ))\n            return stix_object\n\n        if object_type == \"software\"\
          :\n            stix_object[\"name\"] = str(node.get(\"software_name\") or\
          \ representative.get(\"main\") or object_id)\n            if node.get(\"\
          vendor\"):\n                stix_object[\"vendor\"] = str(node.get(\"vendor\"\
          ))\n            if node.get(\"version\"):\n                stix_object[\"\
          version\"] = str(node.get(\"version\"))\n            return stix_object\n\
          \n        if object_type == \"infrastructure\":\n            stix_object[\"\
          name\"] = str(node.get(\"infrastructure_name\") or representative.get(\"\
          main\") or object_id)\n            if description:\n                stix_object[\"\
          description\"] = description\n            infrastructure_types = list(node.get(\"\
          infrastructure_types\") or [])\n            if infrastructure_types:\n \
          \               stix_object[\"infrastructure_types\"] = infrastructure_types\n\
          \            return stix_object\n\n        if object_type == \"identity\"\
          :\n            stix_object[\"name\"] = str(node.get(\"identity_name\") or\
          \ representative.get(\"main\") or object_id)\n            if node.get(\"\
          identity_class\"):\n                stix_object[\"identity_class\"] = str(node.get(\"\
          identity_class\"))\n            sectors_payload = node.get(\"sectors\") or {}\n            sectors = [\n                str(((edge.get(\"node\") or {}).get(\"name\") or \"\")).strip()\n                for edge in list(sectors_payload.get(\"edges\") or [])\n                if str(((edge.get(\"node\") or {}).get(\"name\") or \"\")).strip()\n            ]\n            if sectors:\n                stix_object[\"sectors\"] = sectors\n            return stix_object\n\n        if object_type ==\
          \ \"vulnerability\":\n            stix_object[\"name\"] = str(node.get(\"\
          vulnerability_name\") or representative.get(\"main\") or object_id)\n  \
          \          if description:\n                stix_object[\"description\"\
          ] = description\n            return stix_object\n\n        if object_type\
          \ == \"course-of-action\":\n            stix_object[\"name\"] = str(node.get(\"\
          course_of_action_name\") or representative.get(\"main\") or object_id)\n\
          \            if description:\n                stix_object[\"description\"\
          ] = description\n            return stix_object\n\n        if object_type\
          \ == \"note\":\n            if representative.get(\"main\"):\n         \
          \       stix_object[\"abstract\"] = str(representative.get(\"main\"))\n\
          \            if node.get(\"content\"):\n                stix_object[\"content\"\
          ] = str(node.get(\"content\"))\n            elif description:\n        \
          \        stix_object[\"content\"] = description\n            return stix_object\n\
          \n        if object_type == \"opinion\":\n            if node.get(\"opinion\"\
          ):\n                stix_object[\"opinion\"] = str(node.get(\"opinion\"\
          ))\n            if node.get(\"explanation\"):\n                stix_object[\"\
          explanation\"] = str(node.get(\"explanation\"))\n            return stix_object\n\
          \n        return None\n\n    def fetch_relationship_objects(internal_ids:\
          \ list[str], allowed_standard_ids: set[str]) -> list[dict]:\n        if\
          \ not internal_ids or not allowed_standard_ids:\n            return []\n\
          \        query = \"\"\"\n        query ThreatModelRelationships($ids: [String!],\
          \ $first: Int!) {\n          fromRelationships: stixCoreRelationships(first:\
          \ $first, fromId: $ids) {\n            edges {\n              node {\n \
          \               id\n                standard_id\n                entity_type\n\
          \                relationship_type\n                description\n      \
          \          from { ... on BasicObject { standard_id } }\n               \
          \ to { ... on BasicObject { standard_id } }\n              }\n         \
          \   }\n          }\n          toRelationships: stixCoreRelationships(first:\
          \ $first, toId: $ids) {\n            edges {\n              node {\n   \
          \             id\n                standard_id\n                entity_type\n\
          \                relationship_type\n                description\n      \
          \          from { ... on BasicObject { standard_id } }\n               \
          \ to { ... on BasicObject { standard_id } }\n              }\n         \
          \   }\n          }\n        }\n        \"\"\"\n        data = post_graphql(query,\
          \ {\"ids\": internal_ids, \"first\": 200}, \"ThreatModelRelationships\"\
          )\n        relationship_objects = {}\n        for key in (\"fromRelationships\"\
          , \"toRelationships\"):\n            for edge in data.get(key, {}).get(\"\
          edges\", []):\n                node = edge.get(\"node\") or {}\n       \
          \         source_ref = str((node.get(\"from\") or {}).get(\"standard_id\"\
          ) or \"\")\n                target_ref = str((node.get(\"to\") or {}).get(\"\
          standard_id\") or \"\")\n                relationship_id = str(node.get(\"\
          standard_id\") or node.get(\"id\") or \"\")\n                if not relationship_id\
          \ or source_ref not in allowed_standard_ids or target_ref not in allowed_standard_ids:\n\
          \                    continue\n                relationship_objects[relationship_id]\
          \ = {\n                    \"type\": \"relationship\",\n               \
          \     \"spec_version\": \"2.1\",\n                    \"id\": relationship_id,\n\
          \                    \"relationship_type\": str(node.get(\"relationship_type\"\
          ) or \"related-to\"),\n                    \"source_ref\": source_ref,\n\
          \                    \"target_ref\": target_ref,\n                    **({\"\
          description\": str(node.get(\"description\") or \"\")} if str(node.get(\"\
          description\") or \"\") else {}),\n                }\n        return list(relationship_objects.values())\n\
          \n    def fetch_live_threat_model_bundle(candidate: dict) -> dict:\n   \
          \     query = \"\"\"\n        query ThreatModelReportBundle($id: String!,\
          \ $first: Int!) {\n          stixCoreObject(id: $id) {\n            id\n\
          \            standard_id\n            entity_type\n            representative\
          \ { main secondary }\n            ... on Report {\n              report_name:\
          \ name\n              description\n              published\n           \
          \   report_types\n              objects(first: $first) {\n             \
          \   edges {\n                  node {\n                    __typename\n\
          \                    ... on BasicObject { id standard_id entity_type }\n\
          \                    ... on StixObject { representative { main secondary\
          \ } }\n                    ... on AttackPattern { attack_pattern_name: name\
          \ description kill_chain_phases: killChainPhases { kill_chain_name phase_name } }\n\
          \                    ... on Indicator { indicator_name: name description pattern_type pattern valid_from }\n\
          \                    ... on Software { software_name: name vendor version\
          \ }\n                    ... on Infrastructure { infrastructure_name: name\
          \ description infrastructure_types }\n                    ... on Identity\
          \ { identity_name: name identity_class }\n                    ... on Organization { sectors { edges { node { name } } } }\n                    ...\
          \ on Vulnerability { vulnerability_name: name description }\n          \
          \          ... on CourseOfAction { course_of_action_name: name description\
          \ }\n                    ... on Note { content }\n                    ...\
          \ on Opinion { opinion explanation }\n                  }\n            \
          \    }\n              }\n            }\n          }\n        }\n       \
          \ \"\"\"\n        data = post_graphql(query, {\"id\": candidate[\"internal_id\"\
          ], \"first\": 200}, \"ThreatModelReportBundle\")\n        report = data.get(\"\
          stixCoreObject\")\n        if not report:\n            raise ValueError(f\"\
          OpenCTI 中未找到报告 {candidate['report_id']}。\")\n\n        stix_objects = []\n\
          \        related_internal_ids = []\n        related_standard_ids = set()\n\
          \        for edge in report.get(\"objects\", {}).get(\"edges\", []):\n \
          \           node = edge.get(\"node\") or {}\n            stix_object = convert_live_node_to_stix(node)\n\
          \            if stix_object is None:\n                continue\n       \
          \     stix_objects.append(stix_object)\n            internal_id = str(node.get(\"\
          id\") or \"\")\n            standard_id = str(stix_object.get(\"id\") or\
          \ \"\")\n            if internal_id and standard_id:\n                related_internal_ids.append(internal_id)\n\
          \                related_standard_ids.add(standard_id)\n\n        report_object\
          \ = {\n            \"type\": \"report\",\n            \"spec_version\":\
