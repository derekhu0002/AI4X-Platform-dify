          \       }\n        relationship_objects = fetch_relationship_objects(related_internal_ids,\
          \ related_standard_ids)\n        return {\n            \"type\": \"bundle\"\
          ,\n            \"id\": f\"bundle--{candidate['report_id'].split('--', 1)[-1]}\"\
          ,\n            \"objects\": [report_object, *stix_objects, *relationship_objects],\n\
          \        }\n\n    def filter_threat_model_object(stix_object: dict) -> dict:\n\
          \        object_type = str(stix_object.get(\"type\", \"\")).lower()\n  \
          \      allowed_fields = threat_model_bundle_fields[object_type]\n      \
          \  return {field: stix_object.get(field) for field in allowed_fields if\
          \ field in stix_object}\n\n    def build_threat_model_bundle(bundle: dict,\
          \ report_id: str) -> dict:\n        objects = bundle.get(\"objects\", [])\n\
          \        objects_by_id = {str(obj.get(\"id\", \"\")): obj for obj in objects}\n\
          \        report = objects_by_id.get(report_id)\n        if report is None:\n\
          \            raise ValueError(f\"报告 {report_id} 不在威胁建模 bundle 中。\")\n  \
          \      included_ids = {report_id, *[str(object_id) for object_id in report.get(\"\
          object_refs\", [])]}\n        changed = True\n        while changed:\n \
          \           changed = False\n            for stix_object in objects:\n \
          \               object_type = str(stix_object.get(\"type\", \"\")).lower()\n\
          \                object_id = str(stix_object.get(\"id\", \"\"))\n      \
          \          if object_type == \"relationship\":\n                    source_ref\
          \ = str(stix_object.get(\"source_ref\", \"\"))\n                    target_ref\
          \ = str(stix_object.get(\"target_ref\", \"\"))\n                    if object_id\
          \ in included_ids or source_ref in included_ids or target_ref in included_ids:\n\
          \                        for related_id in (object_id, source_ref, target_ref):\n\
          \                            if related_id and related_id not in included_ids:\n\
          \                                included_ids.add(related_id)\n        \
          \                        changed = True\n\n        filtered_objects = []\n\
          \        for stix_object in objects:\n            object_id = str(stix_object.get(\"\
          id\", \"\"))\n            object_type = str(stix_object.get(\"type\", \"\
          \")).lower()\n            if object_id not in included_ids or object_type\
          \ not in threat_model_bundle_fields:\n                continue\n       \
          \     filtered_objects.append(filter_threat_model_object(stix_object))\n\
          \        filtered_objects.sort(\n            key=lambda item: (\n      \
          \          threat_model_bundle_order.get(str(item.get(\"type\", \"\")).lower(),\
          \ 99),\n                str(item.get(\"name\", item.get(\"id\", \"\"))),\n\
          \            )\n        )\n        return {\"type\": \"bundle\", \"id\"\
          : str(bundle.get(\"id\", \"bundle--threat-model-query\")), \"objects\":\
          \ filtered_objects}\n\n    def build_threat_model_analysis_input(bundle:\
          \ dict, matched_report: dict) -> dict:\n        objects = bundle.get(\"\
          objects\", [])\n        components = [\n            str(obj.get(\"name\"\
          ))\n            for obj in objects\n            if str(obj.get(\"type\"\
          , \"\")).lower() in {\"software\", \"infrastructure\"} and obj.get(\"name\"\
          )\n        ]\n        assets = [\n            str(obj.get(\"name\"))\n \
          \           for obj in objects\n            if str(obj.get(\"type\", \"\"\
          )).lower() == \"identity\" and obj.get(\"name\")\n        ]\n        report_object\
          \ = next(\n            (obj for obj in objects if str(obj.get(\"id\", \"\
          \")) == matched_report[\"report_id\"]),\n            {\"name\": matched_report[\"\
          report_name\"], \"description\": \"\"},\n        )\n        return {\n \
