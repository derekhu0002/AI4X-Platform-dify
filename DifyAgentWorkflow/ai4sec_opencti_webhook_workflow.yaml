          max_retries: 3
          retry_enabled: true
          retry_interval: 100
        selected: false
        ssl_verify: true
        timeout:
          connect: 10
          max_connect_timeout: 10
          max_read_timeout: 600
          max_write_timeout: 600
          read: 600
          write: 600
        title: Query OpenCTI GraphQL
        type: http-request
        url: '{{#env.OPENCTI_GRAPHQL_URL#}}'
        variables: []
      height: 142
      id: query_opencti
