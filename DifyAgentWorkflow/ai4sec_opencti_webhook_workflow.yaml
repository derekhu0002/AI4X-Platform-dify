      id: webhook-trigger
      position:
        x: 30
        y: 120
      positionAbsolute:
        x: 30
        y: 120
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json

          def _extract_bundle_from_dify_webhook(raw_payload: object) -> dict:
              """// @ArchitectureID: 1277"""
              if not isinstance(raw_payload, dict):
                  raise ValueError('Webhook payload must be a dict object.')

              bundle_candidate = raw_payload.get('body')
              if bundle_candidate is None:
                  bundle_candidate = raw_payload

              if isinstance(bundle_candidate, str):
                  bundle = json.loads(bundle_candidate)
              elif isinstance(bundle_candidate, dict):
                  bundle = bundle_candidate
              else:
                  raise ValueError('Webhook body must contain a valid STIX bundle object.')

              return bundle


          def main(raw_payload: object) -> dict:
              """// @ArchitectureID: 1277"""
              bundle = _extract_bundle_from_dify_webhook(raw_payload)
              objects = bundle.get('objects') or []
              if not objects:
                  raise ValueError(f"Webhook bundle {bundle.get('id')} must contain at least one STIX object.")

              signal = objects[0]
              lookup_id = str(signal.get('x_opencti_id') or signal.get('id') or '').strip()
              if not lookup_id:
                  raise ValueError('Webhook signal does not contain lookup id.')

              object_type = str(signal.get('type') or 'vulnerability').strip().lower()
              if object_type == 'attack-pattern':
                  derived_flow = 'VS1'
              elif object_type in {'incident', 'grouping'}:
                  derived_flow = 'VS2'
              elif object_type == 'indicator':
                  derived_flow = 'VS4'
              else:
                  derived_flow = 'VS3'

              graphql_query = """
              query WebhookContext($id: String!, $ids: [String!], $first: Int!) {
                stixCoreObject(id: $id) {
                  id
                  standard_id
                  entity_type
                  representative { main secondary }
                  ... on Vulnerability {
                    vulnerability_name: name
                    description
                    x_opencti_cvss_base_score
                  }
                  ... on Infrastructure {
                    infrastructure_name: name
                    description
                    infrastructure_types
                  }
                  ... on Software {
                    software_name: name
                    vendor
                    version
                  }
                  ... on Identity {
                    identity_name: name
                    identity_class
                  }
                }
                fromRelationships: stixCoreRelationships(first: $first, fromId: $ids) {
                  edges {
                    node {
                      relationship_type
                      description
                      to {
                        __typename
                        ... on BasicObject { id standard_id entity_type }
                        ... on StixObject { representative { main secondary } }
                        ... on Vulnerability { vulnerability_name: name description x_opencti_cvss_base_score }
                        ... on Infrastructure { infrastructure_name: name description infrastructure_types }
                        ... on Software { software_name: name vendor version }
                        ... on Identity { identity_name: name identity_class }
                      }
                    }
                  }
                }
                toRelationships: stixCoreRelationships(first: $first, toId: $ids) {
                  edges {
                    node {
                      relationship_type
                      description
                      from {
                        __typename
                        ... on BasicObject { id standard_id entity_type }
                        ... on StixObject { representative { main secondary } }
                        ... on Vulnerability { vulnerability_name: name description x_opencti_cvss_base_score }
                        ... on Infrastructure { infrastructure_name: name description infrastructure_types }
                        ... on Software { software_name: name vendor version }
                        ... on Identity { identity_name: name identity_class }
                      }
                    }
                  }
                }
              }
              """
              graphql_request = json.dumps(
                  {
                      'query': graphql_query,
                      'operationName': 'WebhookContext',
                      'variables': {'id': lookup_id, 'ids': [lookup_id], 'first': 50},
                  },
                  ensure_ascii=False,
              )

              return {
                  'lookup_id': lookup_id,
                  'object_type': object_type,
                  'selected_flow': derived_flow,
                  'bundle_id': str(bundle.get('id') or ''),
                  'user_request': f'来自 OpenCTI webhook 的 {object_type} 信号：{lookup_id}',
                  'graphql_request': graphql_request,
              }
        code_language: python3
        desc: ''
        outputs:
          bundle_id:
            children: null
            type: string
          graphql_request:
            children: null
            type: string
          lookup_id:
            children: null
            type: string
          object_type:
            children: null
            type: string
          selected_flow:
            children: null
            type: string
          user_request:
            children: null
            type: string
